<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Inbox — NRG CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css"/>
  <script src="../js/config.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00af70">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NRG CRM">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
  <link rel="icon" href="/img/favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="/img/favicon.ico">
  <style>
    .inbox-item { border-bottom: 1px solid var(--border); padding: 20px 0; }
    .inbox-item:last-child { border-bottom: none; }
    .inbox-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .inbox-from { font-weight: 600; font-size: 14px; color: var(--text); }
    .inbox-to { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .inbox-subject { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .inbox-date { font-size: 12px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .inbox-summary { font-size: 13px; color: var(--text); margin-top: 10px; line-height: 1.6; padding: 10px 12px; background: var(--bg-muted); border-radius: 8px; }
    .inbox-attachments { font-size: 12px; color: var(--text-muted); margin-top: 6px; padding: 6px 12px; background: var(--bg-muted); border-radius: 6px; border-left: 3px solid var(--border); }
    .nova-box { margin-top: 12px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .nova-header { padding: 8px 14px; background: var(--bg-muted); font-size: 12px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .nova-logo { width: 16px; height: 16px; background: var(--teal-m); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 9px; font-weight: 700; flex-shrink: 0; }
    .nova-body { padding: 12px 14px; }
    .suggestie-row { display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .suggestie-tekst { flex: 1; font-size: 13px; color: var(--text); min-width: 180px; }
    .match-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .match-hoog { background: #d1fae5; color: #065f46; }
    .match-middel { background: #fef3c7; color: #92400e; }
    .match-laag { background: #fee2e2; color: #991b1b; }
    .match-onbekend { background: var(--bg-muted); color: var(--text-muted); }
    .badge-type { font-size: 11px; padding: 1px 7px; border-radius: 8px; background: var(--teal-l); color: var(--teal-d); font-weight: 500; }
    .actie-keuze { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .actie-tab { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: white; color: var(--text-muted); transition: all .15s; }
    .actie-tab.active { background: var(--teal-m); color: white; border-color: var(--teal-m); }
    .actie-panel { display: none; }
    .actie-panel.active { display: block; }
    .notitie-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .notitie-row select { flex: 1; min-width: 160px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; background: white; color: var(--text); }
    .dicteer-wrap { display: flex; flex-direction: column; gap: 10px; }
    .dicteer-row { display: flex; gap: 8px; align-items: center; }
    .dicteer-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; border: 2px solid var(--teal-m); background: white; color: var(--teal-m); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .dicteer-btn:hover { background: var(--teal-m); color: white; }
    .dicteer-btn.opname { background: #fee2e2; border-color: #ef4444; color: #ef4444; animation: puls 1s infinite; }
    .dicteer-btn.opname:hover { background: #ef4444; color: white; }
    @keyframes puls { 0%,100% { opacity: 1; } 50% { opacity: .6; } }
    .dicteer-tekst { font-size: 13px; color: var(--text-muted); font-style: italic; flex: 1; }
    .nova-analyse { margin-top: 8px; padding: 10px 12px; background: #f0fdf4; border-radius: 8px; border: 1px solid #bbf7d0; font-size: 13px; color: var(--text); display: none; }
    .nova-analyse.zichtbaar { display: block; }
    .nova-analyse-acties { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .inbox-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
    .nieuw-form { margin-top: 10px; padding: 12px; background: var(--bg-muted); border-radius: 8px; border: 1px dashed var(--border); }
    .nieuw-form .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .nieuw-form .form-field { flex: 1; min-width: 140px; }
    .nieuw-form label { font-size: 11px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 3px; }
    .nieuw-form input { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; background: white; color: var(--text); box-sizing: border-box; }
    .nieuw-form .form-actions { display: flex; gap: 8px; margin-top: 4px; }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  </style>
</head>
<body>
<script type="module">
  import { initShell } from '../js/shell.js'
  import { supabase } from '../js/supabase.js'
  import { esc } from '../js/utils.js'

  const ctx = await initShell('inbox')
  if (!ctx) throw new Error()

  const uid = ctx.session.user.id

  const main = document.getElementById('main-content')
  main.innerHTML = `
    <div class="topbar"><h1>E-mail inbox</h1></div>
    <div class="page-content">
      <div class="filter-bar">
        <button class="btn btn-primary" data-f="nieuw">Nieuw</button>
        <button class="btn btn-secondary" data-f="alle">Alle</button>
      </div>
      <div class="card">
        <div class="card-body" id="inbox-body">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  `

  let emails = [], companies = [], filter = 'nieuw'

  const NRG_DOMEINEN = ['nrgsales.nl', 'nrggroup.nl', 'nrg.nl']
  function isNrg(addr) { return NRG_DOMEINEN.some(d => (addr||'').toLowerCase().includes('@'+d)) }
  function guessNaam(addr) {
    if (!addr || isNrg(addr)) return ''
    const m = addr.match(/^([^<@]+)/); return m ? m[1].trim().replace(/[._]/g,' ') : ''
  }
  function guessDomain(addr) {
    if (!addr || isNrg(addr)) return ''
    const domain = addr.split('@')[1]?.toLowerCase(); if (!domain) return ''
    const generiek = ['gmail.com','hotmail.com','outlook.com','yahoo.com','icloud.com','live.com','me.com']
    return generiek.includes(domain) ? '' : 'https://'+domain
  }
  function morgen() {
    const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]
  }

  // NOVA dicteer analyse
  async function novaAnalyseer(tekst, emailId, emailData) {
    const email = emailData
    const companiesLijst = companies.map(c => `${c.name} (id:${c.id})`).join(', ')
    const response = await fetch('/.netlify/functions/transcribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 800,
        messages: [{
          role: 'user',
          content: `Je bent NOVA, een CRM assistent. Analyseer deze gesproken opdracht en bepaal wat de gebruiker wil doen.

Gesproken opdracht: "${tekst}"

Context: dit gaat over een e-mail met onderwerp "${email.subject}" van ${email.from_email}.
Bekende bedrijven: ${companiesLijst}

Geef een JSON response met:
- type: "notitie" of "taak"
- company_id: uuid van het bedrijf als je het herkent (of null)
- company_naam: naam van het bedrijf (of null)
- inhoud: de tekst van de notitie of taak (max 100 woorden)
- due_date: datum in YYYY-MM-DD formaat als er een datum/tijd wordt genoemd (of null)
- bevestiging: een korte vriendelijke bevestigingszin wat NOVA gaat doen (max 20 woorden)

Geef ALLEEN een JSON object terug.`
        }]
      })
    })
    const data = await response.json()
    const tekst2 = data.content?.[0]?.text || ''
    return JSON.parse(tekst2.replace(/\x60\x60\x60json|\x60\x60\x60/g,'').trim())
  }

  async function load() {
    let query = supabase.from('email_inbox').select('*').order('received_at',{ascending:false}).limit(100)

    const [{ data: emailData }, { data: companyData }] = await Promise.all([
      query, supabase.from('companies').select('id, name').order('name')
    ])
    emails = emailData || []; companies = companyData || []; render()
  }

  function render() {
    const filtered = filter === 'nieuw' ? emails.filter(e => !e.verwerkt) : emails
    const body = document.getElementById('inbox-body')
    if (!filtered.length) { body.innerHTML = '<div class="empty-state"><p>Geen e-mails.</p></div>'; return }

    const companyOptions = companies.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('')

    body.innerHTML = filtered.map(e => {
      const z = e.match_zekerheid || 'onbekend'
      const zl = { hoog:'Hoge zekerheid', middel:'Gemiddelde zekerheid', laag:'Lage zekerheid', onbekend:'Onbekend' }[z] || z
      const tl = { bedrijf:'Bedrijf', contactpersoon:'Contact', nieuw_contact:'Nieuw contact', nieuw_bedrijf:'Nieuw bedrijf', onbekend:'Onbekend' }[e.match_type] || '?'
      const eersteExtern = e.geadresseerden ? e.geadresseerden.split(',').map(a=>a.trim()).find(a=>!isNrg(a)) : null
      const voorNaam = e.match_naam || (eersteExtern ? guessNaam(eersteExtern) : '')
      const voorEmail = eersteExtern && !isNrg(eersteExtern) ? eersteExtern : ''
      const voorWebsite = eersteExtern ? guessDomain(eersteExtern) : ''
      const selectedOption = e.match_id && e.match_type === 'bedrijf'
        ? `<option value="${e.match_id}" selected>${esc(e.match_naam||'')}</option>` : ''
      const koppelKnop = e.suggestie_actie === 'koppel_aan_klant' && e.match_id
        ? `<button class="btn btn-primary btn-sm" data-action="koppelen" data-id="${e.id}" data-match-id="${e.match_id}" data-match-type="${e.match_type}">✓ Koppelen aan ${esc(e.match_naam||'klant')}</button>` : ''

      return `
        <div class="inbox-item" data-id="${e.id}">
          <div class="inbox-header">
            <div>
              <div class="inbox-from">${esc(e.from_email||'—')}</div>
              ${e.geadresseerden ? `<div class="inbox-to">Extern: ${esc(e.geadresseerden)}</div>` : ''}
              <div class="inbox-subject">${esc(e.subject||'(geen onderwerp)')}</div>
            </div>
            <div class="inbox-date">${e.received_at ? new Date(e.received_at).toLocaleString('nl-NL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : ''}</div>
          </div>
          ${e.samenvatting ? `<div class="inbox-summary">${esc(e.samenvatting)}</div>` : ''}
          ${e.bijlagen_samenvatting ? `<div class="inbox-attachments">📎 ${esc(e.bijlagen_samenvatting)}</div>` : ''}

          <div class="nova-box">
            <div class="nova-header">
              <span class="nova-logo">N</span>
              NOVA suggestie
            </div>
            <div class="nova-body">
              <div class="suggestie-row">
                <div>
                  ${e.match_naam
                    ? `<div class="match-chip match-${z}">${esc(e.match_naam)} <span class="badge-type">${tl}</span></div>
                       <div style="font-size:12px;color:var(--text-muted);margin-top:3px">${zl}</div>`
                    : `<div class="match-chip match-onbekend">Geen match gevonden</div>`}
                </div>
                ${e.suggestie_toelichting ? `<div class="suggestie-tekst">${esc(e.suggestie_toelichting)}</div>` : ''}
              </div>
              ${koppelKnop ? `<div style="margin-bottom:12px">${koppelKnop}</div>` : ''}

              <div class="actie-keuze">
                <button class="actie-tab active" data-tab="notitie" data-id="${e.id}">📝 Notitie</button>
                <button class="actie-tab" data-tab="dicteer" data-id="${e.id}">🎙️ Spreek actie in</button>
                <button class="actie-tab" data-tab="nieuw" data-id="${e.id}">🏢 Nieuw bedrijf</button>
              </div>

              <div class="actie-panel active" id="panel-notitie-${e.id}">
                <div class="notitie-row">
                  <select data-select-notitie="${e.id}">
                    <option value="">— Kies bedrijf —</option>
                    ${selectedOption}${companyOptions}
                  </select>
                  <button class="btn btn-secondary btn-sm" data-action="notitie" data-id="${e.id}">+ Notitie toevoegen</button>
                </div>
              </div>

              <div class="actie-panel" id="panel-dicteer-${e.id}">
                <div class="dicteer-wrap">
                  <div class="dicteer-row">
                    <button class="dicteer-btn" data-action="dicteer" data-id="${e.id}">
                      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
                      Spreek in
                    </button>
                    <span class="dicteer-tekst" id="dicteer-status-${e.id}">Druk op de knop en spreek je opdracht in...</span>
                  </div>
                  <div class="nova-analyse" id="nova-analyse-${e.id}">
                    <div id="nova-analyse-tekst-${e.id}"></div>
                    <div class="nova-analyse-acties" id="nova-analyse-acties-${e.id}"></div>
                  </div>
                </div>
              </div>

              <div class="actie-panel" id="panel-nieuw-${e.id}">
                <div class="nieuw-form">
                  <div class="form-row">
                    <div class="form-field">
                      <label>Bedrijfsnaam *</label>
                      <input type="text" id="nieuw-naam-${e.id}" value="${esc(voorNaam)}" placeholder="Bedrijfsnaam"/>
                    </div>
                    <div class="form-field">
                      <label>E-mailadres contactpersoon</label>
                      <input type="email" id="nieuw-email-${e.id}" value="${esc(voorEmail)}" placeholder="naam@bedrijf.nl"/>
                    </div>
                  </div>
                  <div class="form-row">
                    <div class="form-field">
                      <label>Website</label>
                      <input type="text" id="nieuw-website-${e.id}" value="${esc(voorWebsite)}" placeholder="https://bedrijf.nl"/>
                    </div>
                    <div class="form-field">
                      <label>Stad</label>
                      <input type="text" id="nieuw-stad-${e.id}" value="" placeholder="Amsterdam"/>
                    </div>
                  </div>
                  <div class="form-actions">
                    <button class="btn btn-primary btn-sm" data-action="maak-bedrijf" data-id="${e.id}">Bedrijf aanmaken & notitie toevoegen</button>
                  </div>
                </div>
              </div>

              <div class="inbox-actions">
                <button class="btn btn-ghost btn-sm" data-action="negeren" data-id="${e.id}">Negeren</button>
              </div>
            </div>
          </div>
        </div>`
    }).join('')

    // Tab wisselen
    body.querySelectorAll('.actie-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const id = tab.dataset.id, type = tab.dataset.tab
        body.querySelectorAll(`.actie-tab[data-id="${id}"]`).forEach(t => t.classList.remove('active'))
        tab.classList.add('active')
        ;['notitie','dicteer','nieuw'].forEach(t => {
          document.getElementById(`panel-${t}-${id}`)?.classList.toggle('active', t === type)
        })
      })
    })

    // Koppelen
    body.querySelectorAll('[data-action="koppelen"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id, email = emails.find(e => e.id === id)
        if (!email) return; btn.disabled = true; btn.textContent = 'Bezig...'
        const bodyParts = []
        if (email.samenvatting) bodyParts.push(email.samenvatting)
        if (email.suggestie_toelichting) bodyParts.push('NOVA: ' + email.suggestie_toelichting)
        if (email.bijlagen_samenvatting) bodyParts.push('Bijlagen: ' + email.bijlagen_samenvatting)
        if (!bodyParts.length && email.raw_email) bodyParts.push(email.raw_email.slice(0, 500))
        const { error } = await supabase.from('activities').insert({
          company_id: btn.dataset.matchType === 'bedrijf' ? btn.dataset.matchId : null,
          type: 'mail', subject: email.subject || '(geen onderwerp)',
          body: bodyParts.join('\n\n'),
          occurred_at: email.received_at ? new Date(email.received_at).toISOString() : new Date().toISOString(), logged_by: uid
        })
        if (!error) { await supabase.from('email_inbox').delete().eq('id', id); await load() }
        else { btn.disabled = false; btn.textContent = '✓ Koppelen'; alert('Fout: '+error.message) }
      })
    })

    // Notitie
    body.querySelectorAll('[data-action="notitie"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id, email = emails.find(e => e.id === id)
        const companyId = body.querySelector(`[data-select-notitie="${id}"]`)?.value || email.match_id || null
        if (!companyId) { alert('Kies eerst een bedrijf.'); return }
        btn.disabled = true; btn.textContent = 'Bezig...'
        const bodyParts2 = []
        if (email.samenvatting) bodyParts2.push(email.samenvatting)
        if (email.suggestie_toelichting) bodyParts2.push('NOVA: ' + email.suggestie_toelichting)
        if (email.bijlagen_samenvatting) bodyParts2.push('Bijlagen: ' + email.bijlagen_samenvatting)
        if (!bodyParts2.length && email.raw_email) bodyParts2.push(email.raw_email.slice(0, 500))
        const { data: actData, error } = await supabase.from('activities').insert({
          company_id: companyId, type: 'mail',
          subject: email.subject || '(geen onderwerp)',
          body: bodyParts2.join('\n\n'),
          occurred_at: email.received_at ? new Date(email.received_at).toISOString() : new Date().toISOString(), logged_by: uid
        }).select()
        if (error) { btn.disabled=false; btn.textContent='+ Notitie toevoegen'; alert('Fout: '+error.message); return }
        if (!actData || actData.length === 0) { alert('Notitie niet opgeslagen — controleer RLS policy op activities tabel'); btn.disabled=false; btn.textContent='+ Notitie toevoegen'; return }
        await supabase.from('email_inbox').delete().eq('id', id); await load()
      })
    })

    // Dicteer actie
    body.querySelectorAll('[data-action="dicteer"]').forEach(btn => {
      let recognition = null
      btn.addEventListener('click', () => {
        const id = btn.dataset.id
        const statusEl = document.getElementById(`dicteer-status-${id}`)
        const analyseEl = document.getElementById(`nova-analyse-${id}`)
        const analyseTekstEl = document.getElementById(`nova-analyse-tekst-${id}`)
        const analyseActiesEl = document.getElementById(`nova-analyse-acties-${id}`)
        const email = emails.find(e => e.id === id)

        if (btn.classList.contains('opname')) {
          recognition?.stop(); return
        }

        const SR = window.SpeechRecognition || window.webkitSpeechRecognition
        if (!SR) { alert('Spraakherkenning niet beschikbaar in deze browser.'); return }

        recognition = new SR()
        recognition.lang = 'nl-NL'
        recognition.continuous = false
        recognition.interimResults = false

        recognition.onstart = () => {
          btn.classList.add('opname'); btn.querySelector('span') && (btn.querySelector('span').textContent = 'Stop opname')
          btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg> Stop opname`
          statusEl.textContent = 'Luistert...'
        }

        recognition.onresult = async (event) => {
          const gesprokenTekst = event.results[0][0].transcript
          statusEl.textContent = `"${gesprokenTekst}"`
          btn.classList.remove('opname')
          btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg> Spreek in`

          analyseTekstEl.textContent = 'NOVA analyseert...'
          analyseEl.classList.add('zichtbaar')
          analyseActiesEl.innerHTML = ''

          try {
            const analyse = await novaAnalyseer(gesprokenTekst, id, email)
            analyseTekstEl.innerHTML = `<strong>NOVA:</strong> ${esc(analyse.bevestiging || '')}`

            if (analyse.type === 'notitie') {
              analyseActiesEl.innerHTML = `
                <button class="btn btn-primary btn-sm" id="nova-bevestig-${id}">✓ Notitie aanmaken</button>
                <button class="btn btn-ghost btn-sm" id="nova-annuleer-${id}">Annuleren</button>`

              const snapEmailId = id
              const snapEmailData = Object.assign({}, email)
              const snapAnalyse = Object.assign({}, analyse)
              document.getElementById(`nova-bevestig-${id}`).addEventListener('click', async () => {
                // Bepaal company_id via meerdere fallbacks
                let compId = null
                // 1. Email match_id (meest betrouwbaar — al gematcht door NOVA bij inlezen)
                if (snapEmailData.match_id && snapEmailData.match_type === 'bedrijf') {
                  compId = snapEmailData.match_id
                }
                // 2. NOVA analyse company_id (UUID check)
                else if (snapAnalyse.company_id && String(snapAnalyse.company_id).length === 36) {
                  compId = snapAnalyse.company_id
                }
                // 3. Zoek op naam in companies array
                else if (snapAnalyse.company_naam) {
                  const gevonden = companies.find(c => c.name.toLowerCase() === snapAnalyse.company_naam.toLowerCase())
                  if (gevonden) compId = gevonden.id
                }

                const bodyDelen = []
                if (snapAnalyse.inhoud) bodyDelen.push(snapAnalyse.inhoud)
                if (snapEmailData.samenvatting && snapEmailData.samenvatting !== snapAnalyse.inhoud) bodyDelen.push('---\nMailsamenvatting: ' + snapEmailData.samenvatting)
                if (snapEmailData.suggestie_toelichting) bodyDelen.push('NOVA: ' + snapEmailData.suggestie_toelichting)

                const { error } = await supabase.from('activities').insert({
                  company_id: compId,
                  type: 'notitie',
                  subject: (snapAnalyse.inhoud || snapEmailData.subject || '(geen onderwerp)').slice(0,80),
                  body: bodyDelen.join('\n') || snapEmailData.samenvatting || '',
                  occurred_at: new Date().toISOString(),
                  logged_by: uid
                })
                if (error) { alert('Fout: ' + error.message); return }
                await supabase.from('email_inbox').delete().eq('id', snapEmailId)
                await load()
              })
            } else if (analyse.type === 'taak') {
              analyseActiesEl.innerHTML = `
                <button class="btn btn-primary btn-sm" id="nova-bevestig-${id}">✓ Taak aanmaken</button>
                <button class="btn btn-ghost btn-sm" id="nova-annuleer-${id}">Annuleren</button>`

              document.getElementById(`nova-bevestig-${id}`).addEventListener('click', async () => {
                const { error } = await supabase.from('tasks').insert({
                  company_id: analyse.company_id || null,
                  title: analyse.inhoud || email.subject,
                  due_date: analyse.due_date || morgen(),
                  status: 'open', assigned_to: uid
                })
                if (!error) { await supabase.from('email_inbox').delete().eq('id', id); await load() }
                else alert('Fout: '+error.message)
              })
            }

            document.getElementById(`nova-annuleer-${id}`)?.addEventListener('click', () => {
              analyseEl.classList.remove('zichtbaar'); statusEl.textContent = 'Druk op de knop en spreek je opdracht in...'
            })
          } catch (err) {
            analyseTekstEl.textContent = 'NOVA kon de opdracht niet verwerken. Probeer opnieuw.'
          }
        }

        recognition.onerror = () => {
          btn.classList.remove('opname')
          btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg> Spreek in`
          statusEl.textContent = 'Fout bij opname. Probeer opnieuw.'
        }

        recognition.start()
      })
    })

    // Nieuw bedrijf
    body.querySelectorAll('[data-action="maak-bedrijf"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id, email = emails.find(e => e.id === id)
        const naam = document.getElementById(`nieuw-naam-${id}`)?.value?.trim()
        if (!naam) { alert('Vul een bedrijfsnaam in.'); return }
        btn.disabled = true; btn.textContent = 'Bezig...'
        const { data: nieuwBedrijf, error: bedrijfError } = await supabase.from('companies')
          .insert({ name: naam, website: document.getElementById(`nieuw-website-${id}`)?.value?.trim()||null,
            city: document.getElementById(`nieuw-stad-${id}`)?.value?.trim()||null, status:'suspect', owner_id:uid })
          .select('id').single()
        if (bedrijfError) { btn.disabled=false; btn.textContent='Bedrijf aanmaken & notitie toevoegen'; alert('Fout: '+bedrijfError.message); return }
        // Contactpersoon aanmaken
        const contactEmail = document.getElementById(`nieuw-email-${id}`)?.value?.trim()
        const contactNaam = email.geadresseerden?.find(g => g.email === contactEmail)?.naam || contactEmail || naam
        if (contactEmail) await supabase.from('contacts').insert({ company_id:nieuwBedrijf.id, name:contactNaam, email:contactEmail })

        // Notitie aanmaken met volledige mailinhoud
        const bodyDelen = []
        if (email.samenvatting) bodyDelen.push(email.samenvatting)
        if (email.suggestie_toelichting) bodyDelen.push('NOVA: ' + email.suggestie_toelichting)
        if (email.bijlagen_samenvatting) bodyDelen.push('Bijlagen: ' + email.bijlagen_samenvatting)
        if (!bodyDelen.length && email.raw_email) bodyDelen.push(email.raw_email.slice(0, 500))

        const { error: notitieError } = await supabase.from('activities').insert({
          company_id: nieuwBedrijf.id, type: 'notitie',
          subject: email.subject || '(geen onderwerp)',
          body: bodyDelen.join('\n\n'),
          occurred_at: email.received_at ? new Date(email.received_at).toISOString() : new Date().toISOString(), logged_by: uid
        })
        if (notitieError) { alert('Bedrijf aangemaakt maar notitie mislukt: ' + notitieError.message); }

        await supabase.from('email_inbox').delete().eq('id', id)
        await load()
      })
    })

    // Negeren
    body.querySelectorAll('[data-action="negeren"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        await supabase.from('email_inbox').delete().eq('id', btn.dataset.id); await load()
      })
    })
  }

  document.querySelectorAll('[data-f]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-f]').forEach(b => b.className='btn btn-secondary')
      btn.className='btn btn-primary'; filter=btn.dataset.f; render()
    })
  })

  await load()
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Inbox — NRG CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css"/>
  <script src="../js/config.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00af70">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NRG CRM">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
  <link rel="icon" href="/img/favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="/img/favicon.ico">
  <style>
    .inbox-item { border-bottom: 1px solid var(--border); padding: 20px 0; }
    .inbox-item:last-child { border-bottom: none; }
    .inbox-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .inbox-from { font-weight: 600; font-size: 14px; color: var(--text); }
    .inbox-subject { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .inbox-date { font-size: 12px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .inbox-summary { font-size: 13px; color: var(--text); margin-top: 10px; line-height: 1.6; padding: 10px 12px; background: var(--bg-muted); border-radius: 8px; }
    .inbox-attachments { font-size: 12px; color: var(--text-muted); margin-top: 6px; padding: 6px 12px; background: var(--bg-muted); border-radius: 6px; border-left: 3px solid var(--border); }
    .suggestie-box { margin-top: 12px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .suggestie-header { padding: 8px 14px; background: var(--bg-muted); font-size: 12px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .suggestie-body { padding: 12px 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .suggestie-tekst { flex: 1; font-size: 13px; color: var(--text); min-width: 180px; }
    .match-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; margin-bottom: 4px; }
    .match-hoog { background: #d1fae5; color: #065f46; }
    .match-middel { background: #fef3c7; color: #92400e; }
    .match-laag { background: #fee2e2; color: #991b1b; }
    .match-onbekend { background: var(--bg-muted); color: var(--text-muted); }
    .badge-type { font-size: 11px; padding: 1px 7px; border-radius: 8px; background: var(--teal-l); color: var(--teal-d); font-weight: 500; }
    .inbox-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .inbox-processed { opacity: 0.4; }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .verwerkt-label { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
  </style>
</head>
<body>
<script type="module">
  import { initShell } from '../js/shell.js'
  import { supabase } from '../js/supabase.js'
  import { esc } from '../js/utils.js'

  const ctx = await initShell('inbox')
  if (!ctx) throw new Error()

  const isAdmin = ctx.profile?.role === 'admin'
  const uid = ctx.session.user.id

  const main = document.getElementById('main-content')
  main.innerHTML = `
    <div class="topbar"><h1>E-mail inbox</h1></div>
    <div class="page-content">
      <div class="filter-bar">
        <button class="btn btn-primary" data-f="nieuw">Nieuw</button>
        <button class="btn btn-secondary" data-f="alle">Alle</button>
        <button class="btn btn-secondary" data-f="verwerkt">Verwerkt</button>
      </div>
      <div class="card">
        <div class="card-body" id="inbox-body">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  `

  let emails = [], filter = 'nieuw'

  async function load() {
    let query = supabase
      .from('email_inbox')
      .select('*')
      .order('received_at', { ascending: false })
      .limit(100)

    if (!isAdmin) query = query.eq('assigned_to', uid)

    const { data } = await query
    emails = data || []
    render()
  }

  function render() {
    const filtered = filter === 'nieuw' ? emails.filter(e => !e.verwerkt)
      : filter === 'verwerkt' ? emails.filter(e => e.verwerkt)
      : emails

    const body = document.getElementById('inbox-body')
    if (!filtered.length) {
      body.innerHTML = '<div class="empty-state"><p>Geen e-mails.</p></div>'
      return
    }

    body.innerHTML = filtered.map(e => {
      const z = e.match_zekerheid || 'onbekend'
      const zl = { hoog: 'Hoge zekerheid', middel: 'Gemiddelde zekerheid', laag: 'Lage zekerheid', onbekend: 'Onbekend' }[z] || z
      const tl = { bedrijf: 'Bedrijf', contactpersoon: 'Contact', nieuw_contact: 'Nieuw contact', nieuw_bedrijf: 'Nieuw bedrijf', onbekend: 'Onbekend' }[e.match_type] || '?'

      const suggestieKnop = e.suggestie_actie === 'koppel_aan_klant' && e.match_id
        ? `<button class="btn btn-primary btn-sm" data-action="koppelen" data-id="${e.id}" data-match-id="${e.match_id}" data-match-type="${e.match_type}">✓ Koppelen aan ${esc(e.match_naam || 'klant')}</button>`
        : e.suggestie_actie === 'maak_nieuwe_klant'
          ? `<button class="btn btn-secondary btn-sm" data-action="nieuw-bedrijf" data-id="${e.id}">+ Nieuwe klant aanmaken</button>`
          : ''

      return `
        <div class="inbox-item ${e.verwerkt ? 'inbox-processed' : ''}" data-id="${e.id}">
          <div class="inbox-header">
            <div>
              <div class="inbox-from">${esc(e.from_email || '—')}</div>
              <div class="inbox-subject">${esc(e.subject || '(geen onderwerp)')}</div>
            </div>
            <div class="inbox-date">${e.received_at ? new Date(e.received_at).toLocaleString('nl-NL', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }) : ''}</div>
          </div>
          ${e.samenvatting ? `<div class="inbox-summary">${esc(e.samenvatting)}</div>` : ''}
          ${e.bijlagen_samenvatting ? `<div class="inbox-attachments">📎 ${esc(e.bijlagen_samenvatting)}</div>` : ''}
          ${!e.verwerkt ? `
            <div class="suggestie-box">
              <div class="suggestie-header">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                Claude suggestie
              </div>
              <div class="suggestie-body">
                <div>
                  ${e.match_naam
                    ? `<div class="match-chip match-${z}">${esc(e.match_naam)} <span class="badge-type">${tl}</span></div>
                       <div style="font-size:12px;color:var(--text-muted)">${zl}</div>`
                    : `<div class="match-chip match-onbekend">Geen match gevonden</div>`}
                </div>
                <div class="suggestie-tekst">${e.suggestie_toelichting ? esc(e.suggestie_toelichting) : ''}</div>
                <div class="inbox-actions">
                  ${suggestieKnop}
                  <button class="btn btn-secondary btn-sm" data-action="negeren" data-id="${e.id}">Negeren</button>
                </div>
              </div>
            </div>
          ` : `<div class="verwerkt-label">✓ Verwerkt</div>`}
        </div>`
    }).join('')

    body.querySelectorAll('[data-action="koppelen"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id
        const email = emails.find(e => e.id === id)
        if (!email) return
        btn.disabled = true; btn.textContent = 'Bezig...'
        const { error } = await supabase.from('activities').insert({
          company_id: btn.dataset.matchType === 'bedrijf' ? btn.dataset.matchId : null,
          type: 'mail',
          subject: email.subject || '(geen onderwerp)',
          body: email.samenvatting || email.raw_email?.slice(0, 500),
          occurred_at: email.received_at,
          logged_by: uid
        })
        if (!error) {
          await supabase.from('email_inbox').update({ verwerkt: true }).eq('id', id)
          await load()
        } else {
          btn.disabled = false; btn.textContent = '✓ Koppelen'
          alert('Fout: ' + error.message)
        }
      })
    })

    body.querySelectorAll('[data-action="nieuw-bedrijf"]').forEach(btn => {
      btn.addEventListener('click', () => { window.location.href = '/pages/klanten.html?nieuw=1' })
    })

    body.querySelectorAll('[data-action="negeren"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        await supabase.from('email_inbox').update({ verwerkt: true }).eq('id', btn.dataset.id)
        await load()
      })
    })
  }

  document.querySelectorAll('[data-f]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-f]').forEach(b => b.className = 'btn btn-secondary')
      btn.className = 'btn btn-primary'
      filter = btn.dataset.f; render()
    })
  })

  await load()
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Wachtwoord instellen — NRG CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/config.js"></script>
  <link rel="icon" href="/img/favicon.ico" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f0f4f3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 18px; padding: 36px 32px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo img { height: 32px; }
    .logo span { font-size: 15px; font-weight: 700; color: #004d59; }
    h1 { font-size: 20px; font-weight: 700; color: #004d59; margin-bottom: 6px; }
    p { font-size: 13.5px; color: #6b7a7d; margin-bottom: 24px; line-height: 1.5; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12.5px; font-weight: 600; color: #004d59; margin-bottom: 6px; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid #dde8e3; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; transition: border-color .15s; }
    input:focus { border-color: #00af70; }
    .btn { width: 100%; padding: 13px; border-radius: 10px; border: none; background: #00af70; color: white; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; transition: background .15s; }
    .btn:hover { background: #009960; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .alert { padding: 11px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .strength { height: 4px; border-radius: 2px; background: #e5e7eb; margin-top: 6px; overflow: hidden; }
    .strength-bar { height: 100%; border-radius: 2px; transition: all .3s; width: 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/img/logo.png" alt="NRG">
    <span>NRG CRM</span>
  </div>
  <h1>Wachtwoord instellen</h1>
  <p>Welkom! Stel een wachtwoord in om toegang te krijgen tot NRG CRM.</p>
  <div id="alert" class="alert" style="display:none"></div>
  <div class="field">
    <label>Nieuw wachtwoord</label>
    <input type="password" id="pw1" placeholder="Minimaal 8 tekens" autocomplete="new-password"/>
    <div class="strength"><div class="strength-bar" id="strength-bar"></div></div>
  </div>
  <div class="field">
    <label>Herhaal wachtwoord</label>
    <input type="password" id="pw2" placeholder="Zelfde wachtwoord" autocomplete="new-password"/>
  </div>
  <button class="btn" id="save-btn">Wachtwoord instellen</button>
</div>

<script type="module">
import { supabase } from './js/supabase.js'

const alertEl = document.getElementById('alert')
const saveBtn = document.getElementById('save-btn')
let session = null

function showAlert(msg, type) {
  alertEl.className = 'alert alert-' + type
  alertEl.textContent = msg
  alertEl.style.display = 'block'
}

// Wachtwoord sterkte indicator
document.getElementById('pw1').addEventListener('input', function() {
  const v = this.value
  const bar = document.getElementById('strength-bar')
  let score = 0
  if (v.length >= 8) score++
  if (v.length >= 12) score++
  if (/[A-Z]/.test(v)) score++
  if (/[0-9]/.test(v)) score++
  if (/[^A-Za-z0-9]/.test(v)) score++
  const colors = ['', '#ef4444', '#f97316', '#eab308', '#00af70', '#00af70']
  const widths = ['0%', '20%', '40%', '60%', '80%', '100%']
  bar.style.width = widths[score]
  bar.style.background = colors[score]
})

// Verwerk token uit URL hash
// Hash kan beginnen met # of met access_token direct
const rawHash = window.location.hash.slice(1)
const hashParams = new URLSearchParams(rawHash)
const tokenHash = hashParams.get('token_hash')
const type = hashParams.get('type')
console.log('hash:', rawHash, 'token_hash:', tokenHash, 'type:', type)

if (tokenHash && type) {
  const { data, error } = await supabase.auth.verifyOtp({ token_hash: tokenHash, type: type })
  if (error) {
    showAlert('Ongeldige of verlopen link. Vraag een nieuwe aan.', 'error')
    saveBtn.disabled = true
  } else {
    session = data.session
    saveBtn.disabled = false
    saveBtn.style.opacity = '1'
  }
} else {
  const { data: { session: existing } } = await supabase.auth.getSession()
  if (existing) {
    session = existing
    saveBtn.disabled = false
    saveBtn.style.opacity = '1'
  } else {
    showAlert('Geen geldige link. Vraag een nieuwe aan.', 'error')
    saveBtn.disabled = true
  }
}

saveBtn.addEventListener('click', async () => {
  const pw1 = document.getElementById('pw1').value
  const pw2 = document.getElementById('pw2').value
  if (pw1.length < 8) { showAlert('Minimaal 8 tekens.', 'error'); return }
  if (pw1 !== pw2) { showAlert('Wachtwoorden komen niet overeen.', 'error'); return }
  saveBtn.disabled = true
  saveBtn.textContent = 'Bezig...'
  const { error } = await supabase.auth.updateUser({ password: pw1 })
  if (error) {
    showAlert('Fout: ' + error.message, 'error')
    saveBtn.disabled = false
    saveBtn.textContent = 'Wachtwoord instellen'
  } else {
    showAlert('✓ Wachtwoord ingesteld! Je wordt doorgestuurd...', 'success')
    saveBtn.textContent = '✓ Opgeslagen'
    setTimeout(() => { window.location.replace('/pages/dashboard.html') }, 1500)
  }
})
</script>
